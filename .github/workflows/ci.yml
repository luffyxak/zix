name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node: ['20', '22']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: Run tests
        run: npm test
      - name: Smoke test (CLI)
        run: |
          node ./src/cli.js pack ./examples/notes --out ./tmp/smoke.html --quiet
          test -s ./tmp/smoke.html
          node ./src/cli.js pack ./examples/notes --password 'ci-pw' --out ./tmp/locked.html --quiet
          test -s ./tmp/locked.html
